<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Minimal — NexTab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            --glass: rgba(255, 255, 255, 0.7);
            --accent: #ff6b6b;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* --- Sidebar (Tasks) --- */
        .sidebar {
            width: 320px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-left: 1px solid rgba(255,255,255,0.5);
            padding: 40px 24px;
            display: flex;
            flex-direction: column;
            order: 2; /* Positions sidebar on the right */
        }

        .agent-header {
            font-size: 24px;
            font-weight: 300;
            margin-bottom: 30px;
            color: var(--text-main);
        }

        .task-section-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .task-list {
            flex: 1;
            overflow-y: auto;
        }

        .task-card {
            background: #fff;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: transform 0.2s;
            cursor: pointer;
        }

        .task-card:hover { transform: translateY(-2px); }

        .checkbox {
            width: 18px; height: 18px;
            border: 2px solid #dfe6e9;
            border-radius: 50%;
        }

        .task-info { font-size: 13px; font-weight: 600; }
        .task-date { font-size: 10px; color: var(--text-muted); font-family: 'Space Mono'; }

        /* --- Main Content --- */
        .main-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 60px 0;
            order: 1;
        }

        .calendar-strip {
            display: flex;
            gap: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .day.active {
            color: var(--accent);
            font-weight: 700;
            border-bottom: 2px solid var(--accent);
        }

        .clock-display {
            font-size: 120px;
            font-weight: 300;
            letter-spacing: -5px;
            color: #2d3436;
            opacity: 0.8;
        }

        /* --- The Curved Dock (Apps) --- */
        .app-dock-container {
            position: relative;
            width: 500px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .dock-label {
            position: absolute;
            top: 0;
            color: var(--accent);
            font-weight: 700;
            font-size: 18px;
        }

        .apps-arc {
            display: flex;
            gap: 15px;
            padding: 20px 40px;
            background: #fff;
            border-radius: 100px 100px 20px 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .app-icon {
            width: 45px;
            height: 45px;
            background: #f8f9fa;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .app-icon:hover {
            transform: translateY(-10px) scale(1.1);
            background: #fff;
            box-shadow: 0 15px 25px rgba(0,0,0,0.1);
        }

        .add-task-btn {
            margin-top: 20px;
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            background: #fff;
            box-shadow: var(--shadow);
            cursor: pointer;
            font-size: 20px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <main class="main-view">
        <div class="calendar-strip">
            <div class="day">Sun 28</div>
            <div class="day">Mon 29</div>
            <div class="day">Tue 30</div>
            <div class="day active">Wed May 1</div>
            <div class="day">Thu 2</div>
            <div class="day">Fri 3</div>
        </div>

        <div class="clock-display" id="clock">18:32</div>

        <div class="app-dock-container">
            <div class="dock-label">Home</div>
            <div class="apps-arc">
                <div class="app-icon">🌟</div>
                <div class="app-icon">📺</div>
                <div class="app-icon">🌐</div>
                <div class="app-icon">💼</div>
                <div class="app-icon">✉️</div>
            </div>
        </div>
    </main>

    <aside class="sidebar">
        <h1 class="agent-header">Agent Floyd</h1>
        <p class="task-section-label">Your Tasks</p>
        
        <div class="task-list">
            <div class="task-card">
                <div class="checkbox"></div>
                <div class="task-content">
                    <div class="task-date">2026-05-11</div>
                    <div class="task-info">26 - BCO601 - MICRO...</div>
                </div>
            </div>
            <div class="task-card">
                <div class="checkbox"></div>
                <div class="task-content">
                    <div class="task-date">2026-05-11</div>
                    <div class="task-info">1ST-BCS602-ML</div>
                </div>
            </div>
            <div class="task-card">
                <div class="checkbox"></div>
                <div class="task-content">
                    <div class="task-date">2026-05-11</div>
                    <div class="task-info">4TH-BIS613-CLOUD...</div>
                </div>
            </div>
        </div>

        <button class="add-task-btn">+</button>
    </aside>

    <script>
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Simple Task Toggle
        document.querySelectorAll('.task-card').forEach(card => {
            card.addEventListener('click', () => {
                card.style.opacity = card.style.opacity === '0.5' ? '1' : '0.5';
                card.querySelector('.checkbox').style.background = 
                    card.style.opacity === '0.5' ? '#55efc4' : 'transparent';
            });
        });
    </script>
</body>
</html>
